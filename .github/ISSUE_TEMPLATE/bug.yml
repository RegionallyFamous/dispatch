name: Bug Report
description: Report a bug or unexpected behaviour in Dispatch for Telex.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.
        
        **Security vulnerabilities must NOT be reported here.** See [SECURITY.md](../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reliably reproduce the issue.
      placeholder: |
        1. Go to Telex admin page
        2. Click Install on project X
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or screenshots.
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: e.g. 6.8
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.2.12
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs from Site Health, or information that might help.
