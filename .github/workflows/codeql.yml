name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC to catch new vulnerability signatures.
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: ${{ matrix.language }}
          # Extend the default security queries with the security-extended pack
          # to catch a broader set of CWEs (path traversal, open redirect, etc.).
          queries: security-extended

      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        if: matrix.language == 'javascript'
        run: npm ci

      - name: Build JavaScript assets
        if: matrix.language == 'javascript'
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          category: '/language:${{ matrix.language }}'
