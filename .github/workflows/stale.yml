name: Mark Stale Issues and PRs

on:
  schedule:
    # Run daily at 02:00 UTC.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Stale issues & PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c5164e84be4d # v9
        with:
          # Issues.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been open for 60 days with no activity.
            It will be closed in 14 days unless someone comments or removes the **stale** label.
            If this is still relevant, please leave a comment or update the issue.
          close-issue-message: >
            Closing due to inactivity. If this is still relevant, please open a new issue.
          close-issue-reason: not_planned

          # Pull requests.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This pull request has been open for 30 days with no activity.
            It will be closed in 7 days unless there is new activity.
            If this work is still in progress, please leave a comment or push a new commit.
          close-pr-message: >
            Closing due to inactivity. The branch will not be deleted.
            Please reopen or open a new PR if you'd like to continue.

          # Labels and exemptions.
          exempt-issue-labels: 'pinned,security,in-progress'
          exempt-pr-labels: 'pinned,security,in-progress'
          remove-stale-when-updated: true
          operations-per-run: 100
