name: Deploy to WordPress.org

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.4.0)'
        required: true

# Requires three repository secrets:
#   WPORG_USERNAME  — WordPress.org committer username
#   WPORG_PASSWORD  — WordPress.org application password (SVN)
#   WPORG_SLUG      — Plugin slug on WordPress.org (e.g. dispatch-for-telex)

permissions:
  contents: read

jobs:
  # Run full CI before touching the SVN repository.
  ci-gate:
    name: CI Gate (lint + tests)
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: wordpress-org

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up PHP
        uses: shivammathur/setup-php@d59004228537ca90c8dca680592a08a675bf52b6 # v2
        with:
          php-version: '8.2'
          extensions: openssl
          tools: composer, wp-cli
          coverage: none

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies (production only)
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Build production assets
        run: npm run build:production

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@99da9f5bd18c69b8f4de9efd8f89f5e2d98a71b4 # v2
        with:
          plugin-slug: ${{ secrets.WPORG_SLUG }}
          svn-username: ${{ secrets.WPORG_USERNAME }}
          svn-password: ${{ secrets.WPORG_PASSWORD }}
          assets-dir: .github/assets
          build-dir: .
          ignore-file: .distignore
