name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# NOTE: To further harden the supply chain, pin all third-party action references
# to immutable commit SHAs (e.g. actions/checkout@<SHA>) and review periodically.
permissions:
  contents: write

jobs:
  # Run full CI checks before publishing so a bad tag can never ship a broken build.
  ci-gate:
    name: CI Gate (lint + tests)
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [ci-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl
          tools: composer, wp-cli
          coverage: none

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Build release zip
        run: make release

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dispatch for Telex ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Dispatch for Telex ${{ github.ref_name }}

            See [readme.txt](https://github.com/${{ github.repository }}/blob/main/readme.txt) for the full changelog.

            ### Install

            Download `dispatch-for-telex-${{ steps.version.outputs.VERSION }}.zip` below and upload it via **Plugins → Add New Plugin → Upload Plugin** in your WordPress admin.
          files: dispatch-for-telex-${{ steps.version.outputs.VERSION }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
